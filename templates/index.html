<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>N5LCC Club Calendar</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body { background: #f8f9fa; }
    .instructions {font-weight: bold; font-size:large;padding-left:75px; margin-bottom:6px;}
    #calendar { max-width: 1100px; margin: 0 auto; background: #fff;
                padding: 1.5rem; border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .event-dot { width:14px; height:14px; border-radius:50%;
                 display:inline-block; cursor:pointer; border:2px solid #fff;
                 box-shadow:0 0 0 1px #aaa; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">&#128225;JeffersonARC Remote Shack Signup</h2>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Event</button>
  </div>
  <p class="instructions">Include NAME, CALL SIGN, PHONE</p>
  <p class="instructions inst">(Click event to delete. Drag event, start, or end to update.)</p>
  <div id="calendar"></div>
</div>

<!-- Add Event Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Event</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="formError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label class="form-label fw-bold">Event Description *</label>
          <textarea id="evTitle" class="form-control" rows="1"
            placeholder="e.g. Brownell, KJ5BYZ, 504-555-1212"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Start *</label>
          <input type="datetime-local" id="evStart" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">End (optional)</label>
          <input type="datetime-local" id="evEnd" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Color</label><br/>
          <span class="me-2">Pick a color:</span>
          <span class="event-dot" style="background:#3788d8"
            onclick="setColor('#3788d8',this)" title="Blue"></span>
          <span class="event-dot ms-1" style="background:#e74c3c"
            onclick="setColor('#e74c3c',this)" title="Red"></span>
          <span class="event-dot ms-1" style="background:#2ecc71"
            onclick="setColor('#2ecc71',this)" title="Green"></span>
          <span class="event-dot ms-1" style="background:#f39c12"
            onclick="setColor('#f39c12',this)" title="Orange"></span>
          <span class="event-dot ms-1" style="background:#9b59b6"
            onclick="setColor('#9b59b6',this)" title="Purple"></span>
          <input type="hidden" id="evColor" value="#3788d8"/>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveEvent()">Save Event</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="delModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete Event?</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="delTitle" class="fw-bold"></p>
        <p class="text-muted small">This cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>

<script>
  let calendar;
  // let FIXED_DATE = "2026-04-04"
  let selectedColor = "#3788d8";
  let pendingDeleteId = null;
  const addModal = new bootstrap.Modal(document.getElementById("addModal"));
  const delModal = new bootstrap.Modal(document.getElementById("delModal"));

  document.addEventListener("DOMContentLoaded", function () {
    const el = document.getElementById("calendar");
    calendar = new FullCalendar.Calendar(el, {
      initialView: "dayGridMonth",
      initialDate: '2026-04-15', // will be parsed as local
      editable: true,                   // enables drag-to-move AND resize
      eventResizableFromStart: true,    // can also drag the start time
      eventLongPressDelay: 500,         // ms before drag starts on touch
      headerToolbar: {
        left:   "prev,next today",
        center: "title",
        right:  "dayGridMonth,timeGridWeek,timeGridDay,listWeek"
      },
      height: "auto",
      selectable: true,
      editable: true,
      events: "/api/events",

      // Click a date to pre-fill start time and open modal
      dateClick: function(info) {
        document.getElementById("evStart").value = info.dateStr + "T09:00";
        document.getElementById("evEnd").value   = info.dateStr + "T10:00";
        openAddModal();
      },

      // Click an event to delete it
      eventClick: function(info) {
        pendingDeleteId = info.event.id;
        document.getElementById("delTitle").textContent = info.event.title;
        delModal.show();
      },

      eventDrop: function(info) {
        saveEventUpdate(info.event);
      },

      eventResize: function(info) {
        saveEventUpdate(info.event);
}
    });
    calendar.render();
  });

  function openAddModal() {
    document.getElementById("evTitle").value = "";
    document.getElementById("formError").classList.add("d-none");
    setColor("#3788d8", document.querySelector(".event-dot"));
    addModal.show();
    setTimeout(() => document.getElementById("evTitle").focus(), 400);
  }

  function setColor(hex, el) {
    selectedColor = hex;
    document.getElementById("evColor").value = hex;
    document.querySelectorAll(".event-dot").forEach(d =>
      d.style.outline = "none");
    if (el) el.style.outline = "3px solid #333";
  }

  function saveEvent() {
    const title = document.getElementById("evTitle").value.trim();
    const start = document.getElementById("evStart").value;
    const end   = document.getElementById("evEnd").value;
    const color = document.getElementById("evColor").value;
    const errBox = document.getElementById("formError");

    if (!title) {
      errBox.textContent = "Please enter an event description.";
      errBox.classList.remove("d-none");
      return;
    }
    if (!start) {
      errBox.textContent = "Please set a start time.";
      errBox.classList.remove("d-none");
      return;
    }
    errBox.classList.add("d-none");

    fetch("/api/events", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({title, start, end: end || null, color})
    })
    .then(r => r.json())
    .then(ev => {
      calendar.addEvent(ev);
      addModal.hide();
    })
    .catch(() => {
      errBox.textContent = "Server error — please try again.";
      errBox.classList.remove("d-none");
    });
  }

  function saveEventUpdate(event) {
    fetch("/api/events/" + event.id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title: event.title,
        start: event.startStr,
        end:   event.endStr || null,
        color: event.backgroundColor
      })
    }).catch(function() {
      // If save fails, revert the drag
      event.revert();
    });
  }

  function confirmDelete() {
    if (!pendingDeleteId) return;
    fetch("/api/events/" + pendingDeleteId, {method: "DELETE"})
    .then(() => {
      const ev = calendar.getEventById(pendingDeleteId);
      if (ev) ev.remove();
      delModal.hide();
      pendingDeleteId = null;
    });
  }
</script>
</body>
</html>
